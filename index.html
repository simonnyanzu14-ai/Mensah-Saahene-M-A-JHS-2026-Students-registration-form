<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - JHS 2026 Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            z-index: 100;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .title {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* Animated Loading Spinner */
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            position: relative;
        }

        .spinner::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Progress Bar */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fff, #667eea);
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 100%;
            }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 15px;
            font-weight: 400;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .loader-container {
            position: relative;
            z-index: 100;
        }

        /* Glassmorphism card effect */
        .loader-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <!-- Main loader -->
    <div class="loader-card">
        <div class="loader-container">
            <div class="logo">📝</div>
            <h1 class="title">Loading...</h1>
            <p class="subtitle">Preparing your experience</p>
            
            <div class="spinner"></div>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <p class="loading-text" id="status">Initializing...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    
    <script>
        // Generate floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 5 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = Math.random() * 4 + 6 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Status messages
        const statuses = [
            'Initializing...',
            'Loading resources...',
            'Fetching data...',
            'Optimizing performance...',
            'Almost there...'
        ];

        let statusIndex = 0;
        const statusElement = document.getElementById('status');

        function updateStatus() {
            statusElement.textContent = statuses[statusIndex % statuses.length];
            statusIndex++;
        }

        // Initialize
        createParticles();
        const statusInterval = setInterval(updateStatus, 800);

        // Simulate app loading with axios
        async function loadApp() {
            try {
                // Replace with your actual API endpoint or data loading
                // const response = await axios.get('/api/config');
                
                // Simulate loading delay
                await new Promise(resolve => setTimeout(resolve, 3000));

                // Smooth transition to app
                gsap.to('.loader-card', {
                    opacity: 0,
                    duration: 0.8,
                    ease: 'power2.inOut',
                    onComplete: () => {
                        // Redirect to main app after animation
                        window.location.href = './index.html';
                    }
                });

                clearInterval(statusInterval);
            } catch (error) {
                console.error('Loading error:', error);
                statusElement.textContent = 'Error loading. Please refresh.';
            }
        }

        // Start loading when page is ready
        window.addEventListener('load', loadApp);
    </script>
</body>
</html>
